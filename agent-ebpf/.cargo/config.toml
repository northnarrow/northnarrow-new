[build]
target = "bpfel-unknown-none"

[unstable]
build-std = ["core"]

[target.bpfel-unknown-none]
# `-C debuginfo=2` is REQUIRED for bpf-linker to emit BTF
# (without DWARF debug info, bpf-linker cannot convert to BTF).
# `-C link-arg=--btf` tells bpf-linker to emit .BTF section.
# Aya 0.13's LSM loader hard-requires BTF info.
rustflags = [
    "-C", "panic=abort",
    "-C", "debuginfo=2",
    "-C", "link-arg=--btf",
]
