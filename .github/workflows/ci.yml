name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  userland:
    name: ${{ matrix.task }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        task: [fmt, clippy, build, test]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.task }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.task }}-
            ${{ runner.os }}-cargo-

      - name: cargo fmt --all --check
        if: matrix.task == 'fmt'
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        if: matrix.task == 'clippy'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build --workspace
        if: matrix.task == 'build'
        run: cargo build --workspace --verbose

      - name: cargo test --workspace
        # Integration tests that need root are #[ignore]d, so the
        # default `cargo test` run is unprivileged.
        if: matrix.task == 'test'
        run: cargo test --workspace --verbose

  test-privileged:
    name: test-privileged (compile-only)
    runs-on: ubuntu-latest
    # Tappa 3 ships ignored integration tests that actually kill
    # processes (need root or CAP_KILL). CI cannot run them, but it
    # still verifies they compile so they can never silently rot.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-privileged-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-privileged-
            ${{ runner.os }}-cargo-

      - name: Compile workspace tests (including ignored)
        run: cargo test --workspace --no-run --verbose

  ade-build:
    # Tappa 6 — verifies the ADE module compiles cleanly without
    # ever pulling a GGUF model or any C++ dependency. The default
    # `MockBackend` is the only backend on the build path.
    name: ade-build (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install stable --profile minimal
          rustup component add clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ade-build-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ade-build-
            ${{ runner.os }}-cargo-

      - name: cargo build (ADE module)
        run: cargo build -p northnarrow-agent --lib --verbose

      - name: cargo clippy (ADE-touched crates)
        run: cargo clippy -p northnarrow-agent -p northnarrow-common --all-targets -- -D warnings

  ade-unit-test:
    # Tappa 6 — runs every ADE unit test (parser validation, escalate
    # transform, prompt builder, mock backend, engine end-to-end with
    # mocks). NEVER downloads a model and NEVER hits the network.
    name: ade-unit-test (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install stable --profile minimal

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ade-test-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ade-test-
            ${{ runner.os }}-cargo-

      - name: cargo test (ADE + correlation + ade_types)
        run: |
          cargo test -p northnarrow-agent --lib ade::
          cargo test -p northnarrow-agent --lib correlation::
          cargo test -p northnarrow-common --lib ade_types::

  ebpf-build:
    name: ebpf-build (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (bpf-linker dependency)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-dev libpolly-18-dev clang lld

      - name: Install nightly Rust + rust-src for build-std
        run: |
          rustup toolchain install nightly --profile minimal --component rust-src,rustfmt,clippy
          rustup default stable

      - name: Install bpf-linker
        run: cargo install bpf-linker --locked

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            agent-ebpf/target
          key: ${{ runner.os }}-cargo-ebpf-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ebpf-

      - name: cargo xtask build-ebpf
        run: cargo xtask build-ebpf

      - name: Verify eBPF object exists
        run: |
          test -f agent-ebpf/target/bpfel-unknown-none/release/northnarrow-agent-ebpf
          file agent-ebpf/target/bpfel-unknown-none/release/northnarrow-agent-ebpf
