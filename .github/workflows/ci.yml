name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: ${{ matrix.task }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        task: [fmt, clippy, build, test]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.task }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.task }}-
            ${{ runner.os }}-cargo-

      - name: cargo fmt --all --check
        if: matrix.task == 'fmt'
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        if: matrix.task == 'clippy'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build --workspace
        if: matrix.task == 'build'
        run: cargo build --workspace --verbose

      - name: cargo test --workspace
        if: matrix.task == 'test'
        run: cargo test --workspace --verbose
