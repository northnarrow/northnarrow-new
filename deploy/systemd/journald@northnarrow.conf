#  systemd-journald config for NorthNarrow's dedicated journal namespace,
#  activated by `LogNamespace=northnarrow` in the agent + watchdog units.
#  Read INSTEAD of journald.conf for this namespace (see journald.conf(5)).
#
#  Product guardrail — NN's logging footprint is self-contained and
#  hard-capped with ZERO customer configuration:
#
#    * A non-default journal namespace runs its own
#      systemd-journald@northnarrow instance with its own store
#      (/var/log/journal/<machine-id>.northnarrow) and sockets. By systemd
#      design it does NOT forward to syslog/kmsg/console — only the default
#      namespace does. So NN messages are never duplicated into
#      /var/log/syslog (the rsyslog amplification that filled 76G).
#    * SystemMaxUse is a hard ceiling: journald vacuums the oldest files to
#      stay under it. A future noisy bug can churn this window but can
#      NEVER fill the disk — the guardrail the SizeMismatch flood lacked.
#
#  Operators retune via drop-ins in /etc/systemd/journald@northnarrow.conf.d/.
[Journal]
# Persistent so a security agent's diagnostic logs survive a reboot (an
# attacker rebooting to cover tracks must not wipe the trail). NOTE: the
# authoritative forensic record is the on-disk chained audit.log (JSONL,
# /var/lib/northnarrow) — this journal is DIAGNOSTIC, so persistent is a
# prudent default, not a dependency.
Storage=persistent
# Hard ceiling. ~1 GiB holds a very long history at the measured idle rate
# (~3 lines/min) yet bounds any future noisy bug.
SystemMaxUse=1G
# Rotate in ~128 MiB files so the cap is enforced granularly (vacuum
# oldest), not as one monolithic file.
SystemMaxFileSize=128M
SystemMaxFiles=16
# Belt-and-suspenders if a host runs journald volatile (no /var/log/journal):
# bound the /run store too.
RuntimeMaxUse=128M
# Defensive + explicit: a non-default namespace does not forward anyway.
ForwardToSyslog=no
